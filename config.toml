# Automatic theme: detects terminal theme and uses appropriate dark/light theme
# Use :theme-toggle (or :tt) to switch between dark and light themes
[theme]
dark = "flexoki_dark"
light = "flexoki_light"
fallback = "flexoki_light"  # Used when terminal doesn't declare a preference
# theme = "flexoki_dark"

[editor]
auto-completion = true
bufferline = "multiple"
completion-trigger-len = 2
line-number = "relative"  # Relative line numbers for easier navigation
mouse = true
cursorline = true
color-modes = true
true-color = true
# rulers = [80, 120]  # Visual guides at 80 and 120 columns
scrolloff = 8  # Keep 8 lines visible above/below cursor
scroll-lines = 3  # Scroll 3 lines at a time
completion-timeout = 100  # Faster completion popup
show-diagnostics = false

[editor.word-completion]
enable = true
trigger-length = 2

[editor.auto-save]
focus-lost = true
after-delay = { enable = true, timeout = 1000 }

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.inline-diagnostics]
cursor-line = "warning"
other-lines = "error"

[editor.lsp]
display-inlay-hints = false
display-messages = true

[editor.soft-wrap]
enable = true

[editor.statusline]
center = ["file-name"]
left = ["mode", "spinner"]
right = [
    "diagnostics",
    "selections",
    "position",
    "file-encoding",
    "file-line-ending",
    "file-type",
]
separator = "│"

[editor.statusline.mode]
insert = "INSERT"
normal = "NORMAL"
select = "SELECT"
# terminal = "TERMINAL"

[editor.whitespace.render]
space = "none"
tab = "all"
newline = "none"

[editor.whitespace.characters]
tab = "→"
tabpad = " "

[editor.indent-guides]
render = true
character = "│"
skip-levels = 1  # Skip first indent level for cleaner look

[editor.search]
smart-case = true  # Case-insensitive unless uppercase used
wrap-around = true  # Wrap search at end of file

[editor.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'
'<' = '>'

# Embedded terminal configuration
# [editor.embedded-terminal]
# scrollback = 10000
# close-on-exit = true
# escape-key = "C-\\"  # Ctrl-\ to exit terminal mode
#
# [editor.embedded-terminal.claude]
# command = "claude"
# include-buffer = false

# Insert mode keymaps
[keys.insert]
esc = ["collapse_selection", "normal_mode"]
j = { k = "normal_mode" } # jk to escape, similar to Neovim config

# Normal mode keymaps
[keys.normal]
# File operations
C-p = "file_picker"  # File picker like Neovim <C-p>
C-s = "symbol_picker"  # LSP document symbols like Neovim <C-s>
C-e = ":config-open"  # Quick config access
"*" = ["move_prev_word_start", "move_next_word_end", "search_selection"]

# Buffer navigation
H = "goto_previous_buffer"  # Like Neovim <S-h>
L = "goto_next_buffer"  # Like Neovim <S-l>

# Line navigation (Vim-like)
"0" = "goto_line_start"  # Go to start of line (like Neovim 0)
"$" = "goto_line_end"  # Go to end of line (like Neovim $)
G = "goto_file_end"  # Go to last line (like Neovim Shift+G)

# Documentation/Hover (Shift+K in Neovim)
# Press K to show hover popup, use Ctrl+d/Ctrl+u to scroll within the popup
# Note: Unlike Neovim, Helix cannot "focus" into the popup (feature not yet available)
K = "hover"  # Show documentation (like Neovim Shift+K)

# Increment/decrement
"+" = "increment"  # Like Neovim +
"-" = "decrement"  # Like Neovim -

# Git operations (using g prefix like Neovim)
[keys.normal.g]
b = ":sh git blame -L %{cursor_line},+1 %{buffer_name}"  # Git blame current line
d = "goto_definition"  # Go to definition (native Helix)
r = "goto_reference"  # Go to references (native Helix)

# View mode (sticky)
[keys.normal.Z]
z = "align_view_center"  # Center view
t = "align_view_top"  # Align to top
b = "align_view_bottom"  # Align to bottom
m = "align_view_middle"  # Align to middle
j = "scroll_down"  # Scroll down
k = "scroll_up"  # Scroll up

# Space is the leader key
[keys.normal.space]
# Quick save
w = ":write"

# Quit
q = ":quit"
Q = ":quit!"

# File explorer (new in Helix 25.07)
# e = "file_picker"  # File picker
# E = ":sh open ."  # Open current directory in Finder/file manager

# Jump list navigation
j = "jump_backward"  # Jump to previous location
J = "jump_forward"  # Jump to next location

# Note: Search is cleared automatically in Helix when you press Escape or move
# No need for a separate clear-search command like in Neovim

# LSP operations
[keys.normal.space.l]
a = "code_action"  # Code actions
d = "hover"  # Show diagnostics/documentation (like <leader>ld)
f = ":format"  # Format code
i = "goto_implementation"  # Go to implementation
j = "goto_next_diag"  # Next diagnostic
k = "goto_prev_diag"  # Previous diagnostic
o = "symbol_tree"  # Symbol tree/outline view (right split)
O = "symbol_tree_hsplit"  # Symbol tree/outline view (bottom split)
b = "breadcrumbs"  # Breadcrumbs picker (current symbol -> parent -> grandparent)
r = "rename_symbol"  # Rename symbol
s = "symbol_picker"  # Document symbols
S = "workspace_symbol_picker"  # Workspace symbols
t = "goto_type_definition"  # Go to type definition
R = "goto_reference"  # Go to references (mapped to <leader>lr in nvim)

# File operations
[keys.normal.space.f]
f = "file_picker"  # Find files
g = "file_picker_in_current_buffer_directory"  # Files in current directory
b = "buffer_picker"  # Buffer picker

# Copy file path operations
[keys.normal.space.t]
r = ":sh ~/.config/helix/scripts/copy_relative_path.sh %{buffer_name}"  # Copy relative file path
a = ":sh ~/.config/helix/scripts/copy_absolute_path.sh %{buffer_name}"  # Copy absolute file path
i = ":sh ~/.config/helix/scripts/copy_import_path.sh %{buffer_name}"  # Copy Python import path
t = ":sh ~/.config/helix/scripts/copy_relative_path_with_lines.sh %{buffer_name} %{cursor_line} %{cursor_line}"  # Copy relative path with line number
T = ":sh ~/.config/helix/scripts/copy_absolute_path_with_lines.sh %{buffer_name} %{cursor_line} %{cursor_line}"  # Copy absolute path with line number

# Search operations
# [keys.normal.space]
# "/" = "global_search"  # Live grep equivalent
#
# Git operations
[keys.normal.space.g]
g = "lazygit"  # Open lazygit (native integration)
b = ":sh git blame %{buffer_name}"  # Git blame on current file
d = ":sh git diff %{buffer_name}"  # Git diff on current file
s = ":sh git status"  # Git status
y = ":sh ~/.config/helix/scripts/github_permalink.sh %{buffer_name} %{selection_line_start} %{selection_line_end}"  # GitHub permalink

# Buffer operations
[keys.normal.space.b]
b = "buffer_picker"  # Buffer picker
d = ":buffer-close"  # Close buffer
n = ":buffer-next"  # Next buffer
p = ":buffer-previous"  # Previous buffer

# Diagnostics
[keys.normal.space.d]
d = "diagnostics_picker"  # Show diagnostics
f = "diagnostics_picker"  # File diagnostics
w = "diagnostics_picker"  # Workspace diagnostics

# Window/split operations
[keys.normal.space.k]
s = ":hsplit"  # Horizontal split
v = ":vsplit"  # Vertical split

# Options toggles
[keys.normal.space.o]
w = ":toggle soft-wrap.enable"  # Toggle wrap
r = ":toggle line-number"  # Toggle relative numbers
l = ":toggle cursorline"  # Toggle cursor line
D = ":toggle lsp.display-inlay-hints"  # Toggle inlay hints
i = ":toggle indent-guides.render"  # Toggle indent guides
m = ":toggle lsp.display-messages"  # Toggle LSP diagnostics messages
t = ":theme-toggle"  # Toggle between dark/light theme
d = ":toggle show-diagnostics"

# Terminal operations
# [keys.normal.space.t]
# t = ":terminal"  # Open terminal in horizontal split
# v = ":terminal-vsplit"  # Open terminal in vertical split
# c = ":claude"  # Open Claude CLI with context

# Select mode keymaps (visual mode equivalent)
[keys.select]
# Line navigation (Vim-like)
"0" = "goto_line_start"  # Go to start of line (like Neovim 0)
"$" = "goto_line_end"  # Go to end of line (like Neovim $)
G = "goto_file_end"  # Go to last line (like Neovim Shift+G)

# Maintain selection when indenting
"<" = ["indent", "keep_selections"]
">" = ["unindent", "keep_selections"]

# GitHub permalink in visual/select mode
[keys.select.space.g]
y = ":sh ~/.config/helix/scripts/github_permalink.sh %{buffer_name} %{selection_line_start} %{selection_line_end}"  # GitHub permalink for selection

# Copy file path with line numbers in visual/select mode
[keys.select.space.t]
t = ":sh ~/.config/helix/scripts/copy_relative_path_with_lines.sh %{buffer_name} %{selection_line_start} %{selection_line_end}"  # Copy relative path with line range
T = ":sh ~/.config/helix/scripts/copy_absolute_path_with_lines.sh %{buffer_name} %{selection_line_start} %{selection_line_end}"  # Copy absolute path with line range

# Terminal mode keymaps
# [keys.terminal]
# "C-\\" = "normal_mode"  # Exit terminal mode
# pageup = "terminal_scroll_up"
# pagedown = "terminal_scroll_down"
#
# [keys.terminal.C-w]
# h = "jump_view_left"
# j = "jump_view_down"
# k = "jump_view_up"
# l = "jump_view_right"
# q = "close_terminal"
#
# Picker mode keymaps
[picker_keys]
"A-q" = "send_to_quickfix"  # Send filtered items to quickfix list

[editor.quickfix]
show-line-numbers = false
